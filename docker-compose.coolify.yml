services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: companycore
      POSTGRES_USER: companycore
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
    volumes:
      - companycore_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companycore -d companycore"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      args:
        COMPANYCORE_BUILD_COMMIT: ${SOURCE_COMMIT:-unknown}
        COMPANYCORE_BUILD_IMAGE: ${COOLIFY_CONTAINER_NAME:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://companycore:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/companycore?schema=public
      SEED_API_KEY: ${SERVICE_PASSWORD_API_KEY}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET}
      API_KEY_HASH_SECRET: ${API_KEY_HASH_SECRET}
      INTEGRATION_SECRET_KEY: ${INTEGRATION_SECRET_KEY}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      COMPANYCORE_PUBLIC_API_BASE_URL: ${COMPANYCORE_PUBLIC_API_BASE_URL:-https://api.companycore.luckysparrow.ch}
      COMPANYCORE_BUILD_COMMIT: ${SOURCE_COMMIT:-unknown}
      COMPANYCORE_BUILD_IMAGE: ${COOLIFY_CONTAINER_NAME:-unknown}
      COMPANYCORE_ALLOWED_ORIGINS: "${COMPANYCORE_ALLOWED_ORIGINS:-https://companycore.luckysparrow.ch,https://api.companycore.luckysparrow.ch}"
      SERVICE_URL_BACKEND_3000: ${SERVICE_URL_BACKEND_3000}
    expose:
      - "3000"

volumes:
  companycore_postgres:
